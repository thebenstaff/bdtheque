<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ma BDthèque">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Ma BDthèque — V-B.1.6.3</title>
<style>
:root{
  --ink:#22242b;        /* encre */
  --paper:#f6f3ec;      /* papier */
  --panel:#ffffff;      /* case de planche */
  --red:#d9403a;        /* rouge kiosque */
  --blue:#2c5f8a;       /* bleu ligne claire */
  --gold:#c8922e;       /* dorure de tranche */
  --muted:#8a8578;
  --ok:#3a7d54;
  --radius:10px;
  --shadow:0 2px 8px rgba(34,36,43,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
  background:var(--paper);color:var(--ink);
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  min-height:100vh;
}
h1,h2,h3,.display{font-family:'Avenir Next Condensed','Arial Narrow',-apple-system,sans-serif;letter-spacing:.02em}

/* ---------- En-tête ---------- */
header{
  background:var(--ink);color:var(--paper);
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:10px;
}
header h1{font-size:1.35rem;text-transform:uppercase;flex:1}
header h1 span{color:var(--red)}
.hbtn{
  background:transparent;border:1.5px solid var(--paper);color:var(--paper);
  border-radius:8px;padding:7px 10px;font-size:.85rem;font-weight:600;
}
/* ---------- Barre d'onglets ---------- */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:var(--ink);display:flex;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -2px 10px rgba(0,0,0,.2);
}
nav button{
  flex:1;background:none;border:none;color:#9aa0ad;
  padding:10px 4px 8px;font-size:.72rem;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
nav button .ico{font-size:1.25rem;line-height:1}
nav button.active{color:var(--paper)}
nav button.active .ico{color:var(--red)}

/* ---------- Générique ---------- */
main{padding:14px 14px 20px;max-width:760px;margin:0 auto}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.chip{
  border:1.5px solid var(--ink);background:var(--panel);color:var(--ink);
  border-radius:999px;padding:6px 13px;font-size:.82rem;font-weight:600;
}
.chip.on{background:var(--ink);color:var(--paper)}
input[type=search],input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;padding:10px 12px;border:1.5px solid #d8d3c6;border-radius:var(--radius);
  background:var(--panel);font-size:1rem;color:var(--ink);font-family:inherit;
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--blue);outline-offset:1px}
label{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:block;margin:12px 0 4px}
.btn{
  background:var(--red);color:#fff;border:none;border-radius:var(--radius);
  padding:12px 18px;font-size:1rem;font-weight:700;width:100%;
}
.btn.secondary{background:var(--panel);color:var(--ink);border:1.5px solid var(--ink)}
.btn.small{width:auto;padding:8px 14px;font-size:.85rem}
.btn:disabled{opacity:.45}
.empty{
  text-align:center;color:var(--muted);padding:44px 20px;line-height:1.55;
  border:2px dashed #d8d3c6;border-radius:var(--radius);margin-top:8px;
}
.empty b{color:var(--ink)}

/* ---------- Étagère : la signature ---------- */
.serie-card{
  background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:12px 12px 8px;margin-bottom:12px;
}
.serie-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.serie-thumb{width:34px;height:46px;border-radius:4px;object-fit:cover;flex:0 0 auto;background:#e6e1d4}
.serie-thumb.ph{display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;color:var(--muted)}
.serie-head h3{font-size:1.12rem;text-transform:uppercase;flex:1}
.badge{
  font-size:.68rem;font-weight:800;letter-spacing:.05em;border-radius:4px;
  padding:2px 7px;color:#fff;text-transform:uppercase;
}
.badge.BD{background:var(--blue)} .badge.Manga{background:var(--red)} .badge.Comics{background:var(--gold)}
.serie-meta{font-size:.78rem;color:var(--muted);margin-top:2px}
.shelf{
  display:flex;align-items:flex-end;gap:3px;overflow-x:auto;
  padding:14px 4px 0;min-height:96px;
  -webkit-overflow-scrolling:touch;
}
.spine{
  flex:0 0 auto;width:26px;height:84px;border-radius:3px 3px 0 0;
  display:flex;align-items:flex-end;justify-content:center;
  font-size:.72rem;font-weight:800;color:#fff;padding-bottom:6px;
  position:relative;border:none;
}
.spine.owned{background:linear-gradient(180deg,var(--blue) 0%,var(--blue) 12%,var(--ink) 12%)}
.spine.owned.lu{background:linear-gradient(180deg,var(--gold) 0%,var(--gold) 12%,var(--ink) 12%)}
.spine.owned.prete{opacity:.55;transform:translateY(-8px)}
.spine.missing{
  background:transparent;border:2px dashed #c9c3b4;color:#b3ad9d;height:76px;
}
.shelf-board{height:6px;background:#d8d3c6;border-radius:2px;margin:0 4px}
.legend{font-size:.72rem;color:var(--muted);margin-top:8px;display:flex;gap:12px;flex-wrap:wrap}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:-1px}

.mosaic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tile{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;text-align:center}
.tile .serie-thumb{width:100%;height:118px;border-radius:0}
.tile .serie-thumb.ph{font-size:1.4rem}
.tile-info{padding:6px 6px 8px}
.tile-info b{display:block;font-size:.74rem;line-height:1.15;max-height:2.3em;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}
.tile-info span{font-size:.68rem;color:var(--muted);display:block;margin-top:3px}
@media (min-width:520px){.mosaic-grid{grid-template-columns:repeat(4,1fr)}}

/* ---------- Détail série / albums ---------- */
.album-row{
  display:flex;gap:10px;background:var(--panel);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:10px;margin-bottom:10px;align-items:center;
}
.cover{
  width:52px;height:74px;border-radius:4px;object-fit:cover;background:#e6e1d4;
  flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--muted);font-size:1.1rem;
}
.album-info{flex:1;min-width:0}
.album-info b{display:block;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.album-info small{color:var(--muted);font-size:.76rem;display:block}
.tags{margin-top:3px;display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--paper);border:1px solid #d8d3c6;color:var(--muted)}
.tag.lu{background:var(--gold);border-color:var(--gold);color:#fff}
.tag.prete{background:var(--red);border-color:var(--red);color:#fff}
.tag.eo{background:var(--blue);border-color:var(--blue);color:#fff}
.tag.wish{background:var(--ink);border-color:var(--ink);color:#fff}

/* ---------- Modale ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(34,36,43,.55);z-index:40;
  display:none;align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
.sheet{
  background:var(--paper);border-radius:16px 16px 0 0;width:100%;max-width:760px;
  max-height:88vh;overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;
}
.sheet h2{font-size:1.2rem;text-transform:uppercase;margin-bottom:4px}
.sheet .close{float:right;background:none;border:none;font-size:1.5rem;color:var(--muted);padding:0 4px}
.row2{display:flex;gap:10px}
.row2>div{flex:1}

/* ---------- Scanner ---------- */
#scanBox{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;margin-top:10px;display:none}
#scanBox.on{display:block}
#scanVideo{width:100%;max-height:44vh;display:block;object-fit:cover}
#scanLine{position:absolute;left:8%;right:8%;top:50%;height:2px;background:var(--red);box-shadow:0 0 8px var(--red)}
.lookup-result{background:var(--panel);border:1.5px solid var(--blue);border-radius:var(--radius);padding:12px;margin-top:12px;display:flex;gap:10px}

/* ---------- Stats ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{
  background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;text-align:center;
}
.stat .n{font-size:1.9rem;font-weight:800;font-family:'Avenir Next Condensed','Arial Narrow',sans-serif}
.stat .l{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
.stat.wide{grid-column:1/-1}
.bar{height:14px;border-radius:7px;overflow:hidden;display:flex;margin-top:8px;background:#e6e1d4}
.bar i{height:100%}
.toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + env(safe-area-inset-bottom));
  background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:999px;
  font-size:.88rem;font-weight:600;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <h1 style="line-height:1.05">Ma <span>BD</span>thèque<br><small id="verTag" style="font-size:.58rem;letter-spacing:.08em;color:#9aa0ad;font-weight:600"></small></h1>
  <button class="hbtn" onclick="exportJSON()">Exporter</button>
  <button class="hbtn" onclick="document.getElementById('importFile').click()">Importer</button>
  <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importJSON(event)">
</header>

<main id="main"></main>

<nav>
  <button id="nav-coll" class="active" onclick="go('coll')"><span class="ico">▮▮▮</span>Collection</button>
  <button id="nav-add" onclick="openAdd()"><span class="ico">＋</span>Ajouter</button>
  <button id="nav-wish" onclick="go('wish')"><span class="ico">★</span>Envies</button>
  <button id="nav-stats" onclick="go('stats')"><span class="ico">◔</span>Stats</button>
</nav>

<!-- Modale ajout / scan -->
<div class="overlay" id="ovAdd">
  <div class="sheet">
    <button class="close" onclick="closeSheet('ovAdd')">✕</button>
    <h2>Ajouter un album</h2>
    <div class="toolbar" style="margin-top:10px">
      <button class="btn small" id="btnScan" onclick="toggleScan()">📷 Scanner le code-barres</button>
    </div>
    <div id="scanBox"><video id="scanVideo" playsinline muted></video><div id="scanLine"></div></div>
    <label>Recherche par titre</label>
    <div class="row2">
      <div><input type="text" id="titleSearch" placeholder="Titre, série, auteur…" onkeydown="if(event.key==='Enter')searchByTitle()"></div>
      <div style="flex:0 0 auto"><button class="btn small" style="height:100%" onclick="searchByTitle()">Chercher</button></div>
    </div>
    <div id="titleOut"></div>
    <label>ISBN (13 chiffres)</label>
    <div class="row2">
      <div><input type="text" id="isbnInput" inputmode="numeric" placeholder="9782205088167"></div>
      <div style="flex:0 0 auto"><button class="btn small" style="height:100%" onclick="lookupISBN()">Rechercher</button></div>
    </div>
    <div id="lookupOut"></div>
    <label>Série</label>
    <input type="text" id="fSerie" list="serieList" placeholder="Nom de la série" oninput="checkSerieMatch()">
    <datalist id="serieList"></datalist>
    <div id="serieWarn"></div>
    <div class="row2">
      <div><label>Type</label>
        <select id="fType"><option>BD</option><option>Manga</option><option>Comics</option></select></div>
      <div><label>Tome n°</label><input type="number" id="fTome" inputmode="numeric" min="0"></div>
    </div>
    <label>Titre de l'album</label>
    <input type="text" id="fTitre">
    <div class="row2">
      <div><label>Scénariste / auteur</label><input type="text" id="fAuteurs"></div>
      <div><label>Éditeur</label><input type="text" id="fEditeur"></div>
    </div>
    <label>Couverture</label>
    <div class="row2">
      <div><input type="text" id="fCover" placeholder="https://…" oninput="showCoverPreview(this.value)"></div>
      <div style="flex:0 0 auto"><button type="button" class="btn small" style="height:100%" onclick="document.getElementById('coverFileInput').click()">📷 Photo</button></div>
    </div>
    <input type="file" id="coverFileInput" accept="image/*" style="display:none" onchange="handleCoverFile(event)">
    <div id="coverPreview"></div>
    <p style="font-size:.72rem;color:var(--muted);margin-top:4px">URL depuis un site (appui long sur l'image → Copier l'adresse), ou 📷 pour prendre/choisir une photo — la photo est compressée automatiquement pour rester légère.</p>
    <div class="toolbar" style="margin-top:8px">
      <button type="button" class="chip" id="cPending" onclick="this.classList.toggle('on')">⏳ À mettre à jour plus tard (référence pas encore trouvée)</button>
    </div>
    <label>Notes personnelles</label>
    <textarea id="fNotes" rows="2"></textarea>
    <div class="toolbar" style="margin-top:12px">
      <button type="button" class="chip" id="cOwn" onclick="this.classList.toggle('on')">Je le possède</button>
      <button type="button" class="chip" id="cLu" onclick="this.classList.toggle('on')">Lu</button>
      <button type="button" class="chip" id="cEO" onclick="this.classList.toggle('on')">Édition originale</button>
      <button type="button" class="chip" id="cDed" onclick="this.classList.toggle('on')">Dédicacé</button>
    </div>
    <label>Support (coche les deux si tu as les deux)</label>
    <div class="toolbar">
      <button type="button" class="chip on" id="cPhys" onclick="this.classList.toggle('on')">📕 Physique</button>
      <button type="button" class="chip" id="cScan" onclick="this.classList.toggle('on')">💻 Scan</button>
    </div>
    <input type="hidden" id="fEditId">
    <button class="btn" style="margin-top:14px" onclick="saveAlbum()">Enregistrer l'album</button>
    <button class="btn secondary" id="btnDelete" style="margin-top:8px;display:none" onclick="deleteAlbum()">Supprimer cet album</button>
  </div>
</div>

<!-- Modale détail série -->
<div class="overlay" id="ovSerie">
  <div class="sheet" id="serieSheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const APP_VERSION="V-B.1.6.3";
const LS_KEY="mabdtheque_v1";
/* REX cartes anglais : demander un stockage persistant pour éviter la purge Safari */
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(()=>{});

/* ================= Modèle =================
   album = {id, serie, type, tome, titre, isbn, auteurs, editeur,
            cover, notes, possede, lu, prete(""|nom), eo, dedicace, dateAjout,
            support:["physique","scan"], pending:Bool}  — pending = couverture/infos
            à compléter plus tard, quand la référence existera dans nos sources
   series = { "Nom de série": {nbTomes:Number} }  — métadonnées par série */
let db={albums:[],series:{}};
try{const raw=localStorage.getItem(LS_KEY); if(raw) db=JSON.parse(raw);}catch(e){}
if(!db.series) db.series={};
/* migration douce : anciens albums sans "support" -> considérés physiques */
for(const a of db.albums) if(!Array.isArray(a.support)) a.support=["physique"];
function persist(){try{localStorage.setItem(LS_KEY,JSON.stringify(db));}catch(e){toast("⚠️ Sauvegarde locale impossible");}}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ================= Navigation ================= */
let view="coll", filterType="", filterSupport="", search="", sortMode="alpha", displayMode="liste";
function go(v){view=v;
  ["coll","wish","stats"].forEach(x=>{const b=document.getElementById("nav-"+x);if(b)b.classList.toggle("active",x===v);});
  document.getElementById("nav-add").classList.remove("active");
  render();
}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2600);}

/* ================= Regroupement par série ================= */
function seriesMap(){
  const m=new Map();
  for(const a of db.albums){
    const key=(a.serie||"Sans série").trim();
    if(!m.has(key)) m.set(key,{nom:key,type:a.type||"BD",albums:[]});
    m.get(key).albums.push(a);
  }
  for(const s of m.values()) s.albums.sort((x,y)=>(x.tome||0)-(y.tome||0));
  return [...m.values()].sort((a,b)=>a.nom.localeCompare(b.nom,"fr"));
}

/* ================= Vue Collection ================= */
function render(){
  const main=document.getElementById("main");
  if(view==="coll") main.innerHTML=renderColl();
  else if(view==="wish") main.innerHTML=renderWish();
  else main.innerHTML=renderStats();
}
function renderColl(){
  let h=`<div class="toolbar">
    <input type="search" placeholder="Rechercher une série, un titre…" value="${esc(search)}"
      oninput="search=this.value;updateCollResults()" style="flex:1;min-width:150px">
  </div>
  <div class="toolbar">
    ${["","BD","Manga","Comics"].map(t=>`<button class="chip ${filterType===t?"on":""}"
      onclick="filterType='${t}';render()">${t||"Tout"}</button>`).join("")}
  </div>
  <div class="toolbar">
    ${[["","Tout support"],["physique","📕 Physique"],["scan","💻 Scan"]].map(([v,l])=>`<button class="chip ${filterSupport===v?"on":""}"
      onclick="filterSupport='${v}';render()">${l}</button>`).join("")}
  </div>
  <div class="toolbar">
    <select id="sortSelect" style="flex:1" onchange="sortMode=this.value;render()">
      <option value="alpha" ${sortMode==="alpha"?"selected":""}>Trier : Alphabétique</option>
      <option value="nb" ${sortMode==="nb"?"selected":""}>Trier : Nombre d'albums</option>
      <option value="recent" ${sortMode==="recent"?"selected":""}>Trier : Ajout récent</option>
      <option value="completion" ${sortMode==="completion"?"selected":""}>Trier : % complété</option>
    </select>
    <button class="chip ${displayMode==='liste'?'on':''}" onclick="displayMode='liste';render()">☰ Liste</button>
    <button class="chip ${displayMode==='mosaique'?'on':''}" onclick="displayMode='mosaique';render()">▦ Mosaïque</button>
  </div>
  <div id="collResults">${collResultsHTML()}</div>`;
  return h;
}
function updateCollResults(){
  const d=document.getElementById("collResults");
  if(d)d.innerHTML=collResultsHTML();
}
function collResultsHTML(){
  let owned=seriesMap().map(s=>({...s,albums:s.albums}))
    .filter(s=>s.albums.some(a=>a.possede&&(!filterSupport||(a.support||[]).includes(filterSupport))))
    .filter(s=>!filterType||s.type===filterType)
    .filter(s=>{if(!search)return true;const q=search.toLowerCase();
      return s.nom.toLowerCase().includes(q)||s.albums.some(a=>(a.titre||"").toLowerCase().includes(q));});
  if(!owned.length)
    return `<div class="empty"><b>Aucune série ne correspond.</b><br>Vide ta recherche ou touche <b>＋ Ajouter</b> pour enregistrer un album.</div>`;
  owned=sortSeries(owned);
  let h="";
  if(displayMode==="mosaique"){
    h+=`<div class="mosaic-grid">`+owned.map(s=>serieTile(s)).join("")+`</div>`;
  }else{
    for(const s of owned) h+=serieCard(s);
    h+=`<div class="legend" style="margin:4px 6px 0">
      <span><i style="background:var(--ink)"></i>Possédé</span>
      <span><i style="background:var(--gold)"></i>Lu (liseré)</span>
      <span><i style="border:2px dashed #c9c3b4;background:none"></i>Manquant</span>
      <span>Décalé vers le haut = prêté</span></div>`;
  }
  return h;
}
function sortSeries(list){
  const poss=s=>s.albums.filter(a=>a.possede);
  const nbTot=s=>Math.max(...s.albums.map(a=>a.tome||0),(db.series[s.nom]&&db.series[s.nom].nbTomes)||0,0);
  const lastAdd=s=>Math.max(...s.albums.map(a=>a.dateAjout?new Date(a.dateAjout).getTime():0),0);
  const arr=[...list];
  if(sortMode==="nb") arr.sort((a,b)=>poss(b).length-poss(a).length);
  else if(sortMode==="recent") arr.sort((a,b)=>lastAdd(b)-lastAdd(a));
  else if(sortMode==="completion") arr.sort((a,b)=>{
    const ca=nbTot(a)?poss(a).length/nbTot(a):0, cb=nbTot(b)?poss(b).length/nbTot(b):0;
    return cb-ca;});
  else arr.sort((a,b)=>a.nom.localeCompare(b.nom,"fr"));
  return arr;
}
function serieThumb(s){
  const withCover=s.albums.find(a=>a.possede&&a.cover);
  if(withCover) return `<img class="serie-thumb" src="${esc(withCover.cover)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'serie-thumb ph\\'>${esc(s.nom.slice(0,2).toUpperCase())}</div>'">`;
  return `<div class="serie-thumb ph">${esc(s.nom.slice(0,2).toUpperCase())}</div>`;
}
function serieCard(s){

async function searchSerieOnline(nom){
  const out=document.getElementById("serieSearchOut");
  out.innerHTML=`<p style="color:var(--muted);margin-bottom:10px">Recherche en cours dans Google Books…</p>`;
  const owned=new Set(db.albums.filter(a=>(a.serie||"").trim()===nom).map(a=>a.tome).filter(Boolean));
  let vols=[];
  try{
    for(let start=0;start<80;start+=40){
      const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent('"'+nom+'"')}&maxResults=40&startIndex=${start}&langRestrict=fr`);
      const j=await r.json();
      if(!j.items) break;
      vols=vols.concat(j.items);
      if(j.items.length<40) break;
    }
  }catch(e){out.innerHTML=`<p style="color:var(--red)">Recherche impossible — vérifie ta connexion.</p>`;return;}
  /* extraire les tomes : "Titre - Tome 3", "Titre T3", "Titre, Vol. 3"… */
  const found=new Map();
  for(const it of vols){
    const v=it.volumeInfo||{}; const t=v.title||"";
    if(!t.toLowerCase().includes(nom.toLowerCase())) continue;
    const m=(t+" "+(v.subtitle||"")).match(/(?:tome|t\.?|vol\.?|#)\s*(\d{1,3})/i);
    if(!m) continue;
    const num=parseInt(m[1],10);
    if(num>0&&num<300&&!found.has(num))
      found.set(num,{tome:num,titre:t,isbn:((v.industryIdentifiers||[]).find(x=>x.type==="ISBN_13")||{}).identifier||"",
        cover:(v.imageLinks&&v.imageLinks.smallThumbnail||"").replace("http://","https://")});
  }
  const missing=[...found.values()].filter(x=>!owned.has(x.tome)).sort((a,b)=>a.tome-b.tome);
  const maxFound=Math.max(...found.keys(),0);
  if(!found.size){out.innerHTML=`<p style="color:var(--muted)">Aucun tome numéroté trouvé pour « ${esc(nom)} ». Google Books couvre mal certaines séries — renseigne le nombre de tomes à la main ci-dessus (info visible sur bedetheque.com).</p>`;return;}
  let h=`<p style="font-size:.85rem;margin-bottom:8px"><b>${found.size} tomes repérés</b> (jusqu'au T${maxFound}) · <b style="color:var(--red)">${missing.length} que tu n'as pas</b> — liste indicative, Google Books peut être incomplet.</p>`;
  if(missing.length){
    h+=missing.map(x=>`<div class="album-row">
      ${x.cover?`<img class="cover" src="${esc(x.cover)}" alt="">`:`<div class="cover">T${x.tome}</div>`}
      <div class="album-info"><b>T${x.tome} · ${esc(x.titre)}</b><small>${x.isbn?"ISBN "+esc(x.isbn):""}</small></div>
      <button class="btn small" onclick='addWishFromSearch(${JSON.stringify(nom)},${x.tome},${JSON.stringify(x.titre)},${JSON.stringify(x.isbn)},${JSON.stringify(x.cover)});this.textContent="✓";this.disabled=true'>＋ Envie</button>
    </div>`).join("");
    h+=`<button class="btn" style="margin-top:6px" onclick="addAllWish('${esc(nom)}')">Tout ajouter aux envies (${missing.length})</button>`;
    window._lastMissing={nom,missing};
  }
  if(maxFound>((db.series[nom]||{}).nbTomes||0))
    h+=`<button class="btn secondary" style="margin-top:8px" onclick="document.getElementById('nbTomesInput').value=${maxFound};saveNbTomes('${esc(nom)}')">Déclarer la série en ${maxFound} tomes</button>`;
  out.innerHTML=h;
}
function addWishFromSearch(serie,tome,titre,isbn,cover){
  const s=seriesMap().find(x=>x.nom===serie);
  db.albums.push({id:uid(),serie,type:(s&&s.type)||"BD",tome,titre,isbn,cover,
    possede:false,lu:false,prete:"",eo:false,dedicace:false,dateAjout:new Date().toISOString()});
  persist();render();toast(`★ T${tome} ajouté aux envies`);

function addAllWish(nom){
  if(!window._lastMissing||window._lastMissing.nom!==nom)return;
  let c=0;
  for(const x of window._lastMissing.missing){
    if(db.albums.some(a=>(a.serie||"").trim()===nom&&a.tome===x.tome))continue;
    addWishFromSearchSilent(nom,x);c++;

  persist();render();openSerie(nom);toast(`★ ${c} tomes ajoutés aux envies`);
}

async function bulkUpdatePending(){
  const pend=db.albums.filter(a=>a.pending&&a.isbn);
  const out=document.getElementById("bulkOut");
  let ok=0;
  for(let i=0;i<pend.length;i++){
    const a=pend[i];
    out.textContent=`Vérification ${i+1}/${pend.length} : ${a.titre||a.isbn}…`;
    const found=await tryFetchISBN(a.isbn);
    if(found){
      if(!a.cover&&found.cover) a.cover=found.cover;
      if(!a.auteurs&&found.auteurs) a.auteurs=found.auteurs;
      if(!a.editeur&&found.editeur) a.editeur=found.editeur;
      if((!a.titre||a.titre===a.isbn)&&found.titre) a.titre=found.titre;
      a.pending=false; ok++;
    }
    await new Promise(r=>setTimeout(r,400)); /* ménage l'API, évite le débit limité */
  }
  persist();
  out.textContent=`Terminé : ${ok}/${pend.length} albums complétés.`;
  render();toast(ok?`✓ ${ok} album${ok>1?"s":""} mis à jour`:"Aucune nouveauté pour l'instant");
}
/* factorisation : la même cascade que lookupISBN, mais sans toucher au formulaire */
async function tryFetchISBN(isbnRaw){
  const isbn=isbnRaw.replace(/[^0-9X]/gi,"");
  if(isbn.length<10) return null;
  for(const q of [`isbn:${isbn}`,`"${isbn}"`,isbn]){
    try{
      const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&country=FR`);
      if(!r.ok) continue;
      const j=await r.json();
      if(j.totalItems>0&&j.items){
        const it=j.items.find(x=>((x.volumeInfo||{}).industryIdentifiers||[]).some(id=>id.identifier===isbn))||j.items[0];
        const v=it.volumeInfo;
        return {titre:v.title||"",auteurs:(v.authors||[]).join(", "),editeur:v.publisher||"",
          cover:(v.imageLinks&&(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail)||"").replace("http://","https://")};
      }
    }catch(e){}
  }
  try{
    const r=await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
    const j=await r.json(); const v=j["ISBN:"+isbn];
    if(v) return {titre:v.title||"",auteurs:(v.authors||[]).map(a=>a.name).join(", "),
      editeur:(v.publishers||[]).map(p=>p.name).join(", "),
      cover:(v.cover&&(v.cover.medium||v.cover.small))||`https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`};
  }catch(e){}
  try{
    const r=await fetchBnf(isbn);
    if(r) return r;
  }catch(e){}
  return null;
}

/* ================= BnF : appel + nettoyage de la notice (V-B.1.6.3) =================
   Le champ dc:title de la BnF contient souvent la notice complète
   ("Titre. [Tome un] / scénario, X ; dessin, Y ; ..."). On la découpe :
   titre propre / mentions de responsabilité (scénariste, dessinateur),
   et on convertit "[Tome un]" -> tome:1 (mots français jusqu'à trente). */
const FR_NUM={un:1,une:1,premier:1,deux:2,trois:3,quatre:4,cinq:5,six:6,sept:7,huit:8,neuf:9,dix:10,
  onze:11,douze:12,treize:13,quatorze:14,quinze:15,seize:16,"dix-sept":17,"dix-huit":18,"dix-neuf":19,
  vingt:20,"vingt-et-un":21,"vingt-deux":22,trente:30};
function cleanBnfName(raw){
  return String(raw||"")
    .replace(/\s*\([^)]*\d[^)]*\)\s*/g," ")               /* dates de vie "(1973-....)" */
    .replace(/\.\s*(Auteur du texte|Illustrateur|Traducteur|Coloriste|Scénariste|Dessinateur)\.?\s*$/i,"")
    .replace(/\s{2,}/g," ").trim();
}
function parseBnfTitle(raw){
  const [titrePart,respPart]=String(raw||"").split(/\s*\/\s*/,2);
  let tome=null;
  const mB=titrePart&&titrePart.match(/\[\s*tome\s+([a-zàâéèêîïôûù-]+|\d+)\s*\]/i);
  if(mB){ const w=mB[1].toLowerCase(); tome=/^\d+$/.test(w)?parseInt(w,10):(FR_NUM[w]||null); }
  const titre=(titrePart||raw||"").replace(/\[[^\]]*\]/g,"").replace(/\.\s*$/,"").trim();
  let auteurs="";
  if(respPart){
    const roles=[...respPart.matchAll(/(scénario|dessin|texte|dessin et couleur)\s*,\s*([^;]+)/gi)];
    if(roles.length) auteurs=roles.map(m=>m[2].trim().replace(/\.\.\.$/,"").trim()).join(", ");
  }
  return {titre,tome,auteurs};
}
async function fetchCoverOnly(titre,auteurs,isbn){
  /* 1) pari direct sur le générateur OpenLibrary (fonctionne parfois même
     quand la fiche bibliographique complète est absente de leur API) */
  try{
    const guess=`https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg?default=false`;
    const r=await fetch(guess,{method:"HEAD"});
    if(r.ok) return guess;
  }catch(e){}
  /* 2) recherche Google Books par titre + auteur plutôt que par ISBN —
     retrouve souvent une couverture même quand la fiche ISBN exacte manque */
  try{
    const auth=(auteurs||"").split(",")[0].trim();
    const q=`intitle:${titre}${auth?` inauthor:${auth}`:""}`;
    const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&country=FR&maxResults=1`);
    const j=await r.json();
    const v=(j.items&&j.items[0]&&j.items[0].volumeInfo)||{};
    const cov=(v.imageLinks&&(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail)||"").replace("http://","https://");
    if(cov) return cov;
  }catch(e){}
  return "";
}
async function fetchBnf(isbn){
  const url=`https://catalogue.bnf.fr/api/SRU?version=1.2&operation=searchRetrieve&query=bib.isbn%3D%22${isbn}%22&recordSchema=dublincore&maximumRecords=1`;
  const r=await fetch(url); const txt=await r.text();
  const xml=new DOMParser().parseFromString(txt,"application/xml");
  if(xml.querySelector("parsererror")) return null;
  const rec=xml.querySelector("recordData")||xml;
  const get=tag=>{const el=rec.getElementsByTagNameNS("*",tag)[0];return el?el.textContent.trim():"";};
  const rawTitle=get("title"); if(!rawTitle) return null;
  const {titre,tome,auteurs:auteursTitre}=parseBnfTitle(rawTitle);
  const creators=[...rec.getElementsByTagNameNS("*","creator")].map(e=>cleanBnfName(e.textContent)).filter(Boolean);
  const auteurs=auteursTitre||creators.join(", ");
  const editeur=get("publisher").replace(/\s*\([^)]+\)\s*$/,"").trim(); /* retire "(Paris)" */
  const cover=await fetchCoverOnly(titre,auteurs,isbn); /* V-B.1.6.3 : couverture de secours */
  return {titre,tome,auteurs,editeur,cover,resume:"",source:"bnf"};
}

  showCoverPreview(a.cover||"");
  document.getElementById("fNotes").value=a.notes||"";
  document.getElementById("isbnInput").value=a.isbn||"";
  document.getElementById("cOwn").classList.toggle("on",!!a.possede);
  document.getElementById("cLu").classList.toggle("on",!!a.lu);
  document.getElementById("cEO").classList.toggle("on",!!a.eo);
  document.getElementById("cDed").classList.toggle("on",!!a.dedicace);
  const sup=Array.isArray(a.support)?a.support:["physique"];
  document.getElementById("cPhys").classList.toggle("on",sup.includes("physique"));
  document.getElementById("cScan").classList.toggle("on",sup.includes("scan"));
  document.getElementById("cPending").classList.toggle("on",!!a.pending);
  document.getElementById("btnDelete").style.display="block";
  /* champ prêt */
  addPretField(a.prete||"");
  document.getElementById("ovAdd").classList.add("open");
}
function addPretField(val){
  let f=document.getElementById("fPrete");
  if(!f){
    const div=document.createElement("div");
    div.innerHTML=`<label>Prêté à (laisser vide si non prêté)</label><input type="text" id="fPrete">`;
    document.getElementById("fNotes").parentNode.insertBefore(div,document.getElementById("fNotes").nextSibling);
    f=document.getElementById("fPrete");
  }
  f.value=val;
}
function checkSerieMatch(){
  const val=document.getElementById("fSerie").value.trim();
  const w=document.getElementById("serieWarn");
  if(!val){w.innerHTML="";return;}
  const editId=document.getElementById("fEditId").value;
  const exact=seriesMap().find(s=>s.nom.toLowerCase()===val.toLowerCase()&&s.nom!==val);
  const proche=!exact&&seriesMap().find(s=>s.nom!==val&&(s.nom.toLowerCase().includes(val.toLowerCase())||val.toLowerCase().includes(s.nom.toLowerCase()))&&val.length>2);
  if(exact){
    w.innerHTML=`<p style="font-size:.78rem;color:var(--blue);margin-top:4px">ℹ️ Différence de casse avec la série existante « ${esc(exact.nom)} » (${exact.albums.length} albums) — touche pour corriger l'orthographe.</p>
      <button type="button" class="chip" onclick="document.getElementById('fSerie').value='${esc(exact.nom)}';checkSerieMatch()">Utiliser « ${esc(exact.nom)} »</button>`;
  }else if(proche&&!editId){
    w.innerHTML=`<p style="font-size:.78rem;color:var(--red);margin-top:4px">⚠️ Nom proche d'une série existante : « ${esc(proche.nom)} » (${proche.albums.length} albums). Vérifie que ce n'est pas la même avant d'enregistrer, sinon cet album ira dans la mauvaise série.</p>`;
  }else w.innerHTML="";
}
function clearForm(){
  ["fSerie","fTome","fTitre","fAuteurs","fEditeur","fCover","fNotes","isbnInput","fEditId","titleSearch"].forEach(i=>document.getElementById(i).value="");
  document.getElementById("titleOut").innerHTML="";
  document.getElementById("fType").value="BD";
  document.getElementById("cOwn").classList.add("on");
  ["cLu","cEO","cDed","cScan"].forEach(i=>document.getElementById(i).classList.remove("on"));
  document.getElementById("cPhys").classList.add("on");
  document.getElementById("cPending").classList.remove("on");
  document.getElementById("btnDelete").style.display="none";
  document.getElementById("lookupOut").innerHTML="";
  document.getElementById("serieWarn").innerHTML="";
  document.getElementById("coverPreview").innerHTML="";
  addPretField("");
  stopScan();
}
function refreshSerieList(){
  document.getElementById("serieList").innerHTML=[...new Set(db.albums.map(a=>a.serie).filter(Boolean))].map(s=>`<option value="${esc(s)}">`).join("");
}
function saveAlbum(){
  const serie=document.getElementById("fSerie").value.trim();
  const titre=document.getElementById("fTitre").value.trim();
  if(!serie&&!titre){toast("Indique au moins une série ou un titre");return;}
  const id=document.getElementById("fEditId").value;
  const data={
    serie:serie||titre, type:document.getElementById("fType").value,
    tome:parseInt(document.getElementById("fTome").value,10)||0,
    titre:titre||serie, isbn:document.getElementById("isbnInput").value.trim(),
    auteurs:document.getElementById("fAuteurs").value.trim(),
    editeur:document.getElementById("fEditeur").value.trim(),
    cover:document.getElementById("fCover").value.trim(),
    notes:document.getElementById("fNotes").value.trim(),
    possede:document.getElementById("cOwn").classList.contains("on"),
    lu:document.getElementById("cLu").classList.contains("on"),
    eo:document.getElementById("cEO").classList.contains("on"),
    dedicace:document.getElementById("cDed").classList.contains("on"),
    prete:(document.getElementById("fPrete")||{value:""}).value.trim(),
    support:[document.getElementById("cPhys").classList.contains("on")?"physique":null,
             document.getElementById("cScan").classList.contains("on")?"scan":null].filter(Boolean),
    pending:document.getElementById("cPending").classList.contains("on"),
  };
  if(!data.support.length) data.support=["physique"];

  else{db.albums.push({id:uid(),dateAjout:new Date().toISOString(),...data});toast("Album ajouté 📚");}

}
function deleteAlbum(){
  const id=document.getElementById("fEditId").value; if(!id)return;
  if(!confirm("Supprimer définitivement cet album ?"))return;
  db.albums=db.albums.filter(a=>a.id!==id);
  persist();closeSheet("ovAdd");render();toast("Album supprimé");
}
function closeSheet(id){document.getElementById(id).classList.remove("open");if(id==="ovAdd")stopScan();}

/* ================= Couverture depuis les photos (V-B.1.6.3) =================
   Compression côté client pour rester léger dans le stockage du navigateur
   (localStorage ~5-10 Mo au total selon les appareils). */
function handleCoverFile(ev){
  const file=ev.target.files[0]; if(!file)return;
  const img=new Image();
  const reader=new FileReader();
  reader.onload=()=>{
    img.onload=()=>{
      const maxW=280;
      const scale=Math.min(1,maxW/img.width);
      const canvas=document.createElement("canvas");
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      const dataUrl=canvas.toDataURL("image/jpeg",0.75);
      document.getElementById("fCover").value=dataUrl;
      showCoverPreview(dataUrl);
      toast("Photo ajoutée ✓");
    };
    img.src=reader.result;
  };
  reader.onerror=()=>toast("Impossible de lire cette photo");
  reader.readAsDataURL(file);
  ev.target.value="";
}
function showCoverPreview(url){
  const p=document.getElementById("coverPreview");
  p.innerHTML=url?`<img src="${esc(url)}" style="width:70px;height:96px;object-fit:cover;border-radius:4px;margin-top:8px" alt="">`:"";
}

/* ================= Recherche par titre (V-B.1.6.3) ================= */
let _titleResults=[];
async function searchByTitle(){
  const q=document.getElementById("titleSearch").value.trim();
  if(q.length<3){toast("Tape au moins 3 caractères");return;}
  const out=document.getElementById("titleOut");
  out.innerHTML=`<p style="margin-top:10px;color:var(--muted)">Recherche en cours…</p>`;
  let items=[];
  try{
    const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=12&langRestrict=fr&country=FR&printType=books&orderBy=relevance`);
    if(!r.ok){const t=await r.text();out.innerHTML=`<p style="color:var(--red);margin-top:10px;font-size:.82rem">Erreur API ${r.status} : ${esc(t.slice(0,300))}</p>`;return;}
    const j=await r.json(); items=j.items||[];
  }catch(e){out.innerHTML=`<p style="color:var(--red);margin-top:10px;font-size:.82rem">Appel réseau impossible (${esc(e.message)}). Si tu es sur un Wi-Fi filtré (travail), passe en 4G et réessaie.</p>`;return;}
  if(!items.length){out.innerHTML=`<p style="color:var(--muted);margin-top:10px">Aucun résultat pour « ${esc(q)} ». Essaie avec le nom de la série seul.</p>`;return;}
  _titleResults=items.map(it=>{
    const v=it.volumeInfo||{};
    return {titre:v.title||"",soustitre:v.subtitle||"",auteurs:(v.authors||[]).join(", "),
      editeur:v.publisher||"",date:(v.publishedDate||"").slice(0,4),
      isbn:((v.industryIdentifiers||[]).find(x=>x.type==="ISBN_13")||{}).identifier||"",
      cover:(v.imageLinks&&(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail)||"").replace("http://","https://")};
  });
  out.innerHTML=`<p style="font-size:.8rem;color:var(--muted);margin-top:8px">Touche le bon album pour remplir la fiche :</p>`+
    _titleResults.map((x,i)=>`<div class="album-row" onclick="pickTitleResult(${i})">
      ${x.cover?`<img class="cover" src="${esc(x.cover)}" alt="">`:`<div class="cover">?</div>`}
      <div class="album-info"><b>${esc(x.titre)}${x.soustitre?" — "+esc(x.soustitre):""}</b>
        <small>${esc(x.auteurs)}${x.editeur?" · "+esc(x.editeur):""}${x.date?" · "+x.date:""}</small>
        <small>${x.isbn?"ISBN "+esc(x.isbn):""}</small></div></div>`).join("");
}
function pickTitleResult(i){
  const x=_titleResults[i]; if(!x)return;
  const full=x.titre+(x.soustitre?" "+x.soustitre:"");
  document.getElementById("fTitre").value=full;
  document.getElementById("fAuteurs").value=x.auteurs;
  document.getElementById("fEditeur").value=x.editeur;
  document.getElementById("fCover").value=x.cover;
  document.getElementById("isbnInput").value=x.isbn;
  const m=full.match(/^(.*?)[,–-]?\s*(?:tome|t\.?|vol\.?|#)\s*(\d+)/i);
  if(m){document.getElementById("fSerie").value=m[1].trim();document.getElementById("fTome").value=m[2];}
  else document.getElementById("fSerie").value=document.getElementById("fSerie").value||x.titre;
  checkSerieMatch();
  document.getElementById("titleOut").innerHTML="";
  toast("Fiche pré-remplie — vérifie et complète ✓");
}

/* ================= Recherche ISBN (Google Books puis OpenLibrary) ================= */
async function lookupISBN(){
  const isbn=document.getElementById("isbnInput").value.replace(/[^0-9X]/gi,"");
  if(isbn.length<10){toast("ISBN incomplet");return;}
  const out=document.getElementById("lookupOut");
  out.innerHTML=`<p style="margin-top:10px;color:var(--muted)">Recherche en cours…</p>`;
  let found=null;
  /* cascade : l'API Google Books rate souvent des ISBN (surtout 979-) via "isbn:" ;
     on retente alors en recherche libre sur le numéro. (bug corrigé V-B.1.6.3) */
  const gbQueries=[`isbn:${isbn}`,`"${isbn}"`,isbn];
  let lastErr="";
  for(const q of gbQueries){
    if(found)break;
    try{
      const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&country=FR`);
      if(!r.ok){lastErr=`API ${r.status}`;const t=await r.text();lastErr+=" "+t.slice(0,200);continue;}
      const j=await r.json();
      if(j.totalItems>0&&j.items){
        /* privilégier l'item dont l'ISBN correspond exactement */
        const it=j.items.find(x=>((x.volumeInfo||{}).industryIdentifiers||[]).some(id=>id.identifier===isbn))||j.items[0];
        const v=it.volumeInfo;
        found={titre:v.title||"",auteurs:(v.authors||[]).join(", "),editeur:v.publisher||"",
          cover:(v.imageLinks&&(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail)||"").replace("http://","https://"),
          resume:v.description||""};
      }
    }catch(e){lastErr="réseau : "+e.message;}
  }
  if(!found){
    try{
      const r=await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
      const j=await r.json(); const v=j["ISBN:"+isbn];
      if(v) found={titre:v.title||"",auteurs:(v.authors||[]).map(a=>a.name).join(", "),
        editeur:(v.publishers||[]).map(p=>p.name).join(", "),
        cover:(v.cover&&(v.cover.medium||v.cover.small))||`https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`,resume:""};
    }catch(e){if(!lastErr)lastErr="réseau : "+e.message;}
  }
  /* 3e recours : BnF (catalogue général, SRU/Dublin Core) — très complet sur l'édition
     française mais pas d'image de couverture, et notice brute à nettoyer (V-B.1.6.3) */
  if(!found){
    try{ found=await fetchBnf(isbn); }
    catch(e){if(!lastErr)lastErr="BnF : "+e.message;}
  }
  if(!found){out.innerHTML=`<p style="margin-top:10px;color:var(--red);font-weight:600">Introuvable dans Google Books, OpenLibrary et la BnF — probablement une parution trop récente pour ces catalogues.</p>
    <a href="https://www.google.com/search?q=${isbn}" target="_blank" rel="noopener" class="btn secondary" style="display:block;text-align:center;text-decoration:none;margin-top:8px">🔍 Chercher « ${esc(isbn)} » sur Google</a>
    <p style="font-size:.78rem;color:var(--muted);margin-top:6px">Ouvre le résultat, recopie titre/auteur/éditeur ci-dessous, et pour la couverture : appuie longuement sur l'image du livre → Copier l'image → colle son adresse si ton navigateur le permet, ou laisse vide.</p>
    ${lastErr?`<p style="font-size:.72rem;color:var(--muted)">Détail technique : ${esc(lastErr)}</p>`:""}`;return;}
  document.getElementById("fTitre").value=found.titre;
  document.getElementById("fAuteurs").value=found.auteurs;
  document.getElementById("fEditeur").value=found.editeur;
  document.getElementById("fCover").value=found.cover;
  /* devine série + tome depuis le titre : "Titre, Tome 3" / "Titre T3" / "Titre - 3" */
  const m=found.titre.match(/^(.*?)[,–-]?\s*(?:tome|t\.?|vol\.?|#)\s*(\d+)/i);
  if(found.tome){document.getElementById("fSerie").value=found.titre.trim();document.getElementById("fTome").value=found.tome;}
  else if(m){document.getElementById("fSerie").value=m[1].trim();document.getElementById("fTome").value=m[2];}
  checkSerieMatch();
  checkSerieMatch();
  out.innerHTML=(found.source==="bnf"&&!found.cover)
    ? `<div class="lookup-result"><div class="cover">?</div>
      <div style="font-size:.88rem"><b>${esc(found.titre)}</b><br>
      <span style="color:var(--muted)">${esc(found.auteurs)}${found.editeur?" · "+esc(found.editeur):""}</span><br>
      <span style="color:var(--ok);font-weight:700">✓ Fiche trouvée via la BnF</span> — pas de couverture disponible, ajoute une image si tu en as une.</div></div>`
    : `<div class="lookup-result">
    ${found.cover?`<img class="cover" src="${esc(found.cover)}" alt="">`:""}
    <div style="font-size:.88rem"><b>${esc(found.titre)}</b><br>
    <span style="color:var(--muted)">${esc(found.auteurs)}${found.editeur?" · "+esc(found.editeur):""}</span><br>
    <span style="color:var(--ok);font-weight:700">✓ Fiche pré-remplie${found.source==="bnf"?" (BnF + couverture retrouvée)":""} — vérifie et complète</span></div></div>`;
}

/* ================= Scanner code-barres =================
   Voie 1 : API native BarcodeDetector (Chrome/Android).
   Voie 2 (REX Safari iOS) : bibliothèque ZXing chargée à la volée. */
let scanStream=null,scanTimer=null,detector=null,zxingReader=null;
function loadZXing(){
  return new Promise((res,rej)=>{
    if(window.ZXing)return res();
    const s=document.createElement("script");
    s.src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js";
    s.onload=res; s.onerror=()=>rej(new Error("cdn"));
    document.head.appendChild(s);
  });
}
async function toggleScan(){
  const box=document.getElementById("scanBox");
  if(box.classList.contains("on")){stopScan();return;}
  const video=document.getElementById("scanVideo");
  const native=("BarcodeDetector" in window);
  if(!native){
    try{await loadZXing();}
    catch(e){toast("Scanner indisponible (pas de réseau ?) — saisis l'ISBN au clavier");return;}
  }
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  }catch(e){toast("Accès caméra refusé — autorise-le dans Réglages > Safari");return;}
  video.srcObject=scanStream; await video.play();
  box.classList.add("on");
  document.getElementById("btnScan").textContent="⏹ Arrêter le scan";
  if(native){
    try{detector=detector||new BarcodeDetector({formats:["ean_13","ean_8"]});}
    catch(e){detector=new BarcodeDetector();}
    scanTimer=setInterval(async()=>{
      try{
        const codes=await detector.detect(video);
        if(codes.length)onScanValue(codes[0].rawValue);
      }catch(e){}
    },350);
  }else{
    zxingReader=new ZXing.BrowserMultiFormatReader();
    zxingReader.decodeFromStream(scanStream,video,(result)=>{
      if(result)onScanValue(result.getText());
    }).catch(()=>{});
  }
}
function onScanValue(raw){
  const val=String(raw||"").replace(/[^0-9X]/gi,"");
  if(val.length<10)return;
  document.getElementById("isbnInput").value=val;
  stopScan(); if(navigator.vibrate)navigator.vibrate(80);
  toast("Code-barres lu ✓"); lookupISBN();
}
function stopScan(){
  if(scanTimer){clearInterval(scanTimer);scanTimer=null;}
  if(zxingReader){try{zxingReader.reset();}catch(e){}zxingReader=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  const v=document.getElementById("scanVideo"); if(v)v.srcObject=null;
  document.getElementById("scanBox").classList.remove("on");
  const b=document.getElementById("btnScan"); if(b)b.textContent="📷 Scanner le code-barres";
}

/* ================= Export / Import ================= */
function exportJSON(){
  const blob=new Blob([JSON.stringify({app:"MaBDtheque",version:APP_VERSION,exporte:new Date().toISOString(),albums:db.albums,series:db.series},null,1)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`mabdtheque_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  toast("Export prêt — enregistre-le dans iCloud Drive via la feuille de partage");
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const j=JSON.parse(r.result);
      const albums=Array.isArray(j)?j:(j.albums||[]);
      if(!Array.isArray(albums)) throw 0;
      if(!confirm(`Importer ${albums.length} albums ? Cela remplace la collection actuelle (${db.albums.length} albums).`))return;
      db.albums=albums; db.series=(j.series&&typeof j.series==="object")?j.series:{};
      for(const a of db.albums) if(!Array.isArray(a.support)) a.support=["physique"];
      persist(); render(); toast("Import réussi ✓");
    }catch(e){toast("Fichier invalide");}
  };
  r.readAsText(f); ev.target.value="";
}

document.getElementById("verTag").textContent=APP_VERSION;
render();
